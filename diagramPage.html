<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="System Architecture Diagram - Wholesale Book Store Management System">
    <title>System Architecture | Wholesale Book Store Management System</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --brown-dark: #3d2b20;
            --brown-mid: #6b4530;
            --terracotta: #c2542f;
            --terracotta-dark: #a34324;
            --cream: #f6efe2;
            --cream-light: #fbf6ec;
            --border-soft: #e6d9c2;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(160deg, #f6efe2 0%, #e9dcc3 100%);
            min-height: 100vh;
            padding: 20px;
            color: #3d2b20;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: var(--cream-light);
            border: 1px solid var(--border-soft);
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(61, 43, 32, 0.08);
            text-align: center;
        }

        header h1 {
            color: var(--brown-dark);
            font-size: 2em;
            margin-bottom: 10px;
        }

        header h2 {
            color: var(--brown-mid);
            font-size: 1.2em;
            font-weight: 300;
        }

        header p {
            color: #7a6a58;
            font-size: 1.05em;
        }

        .content {
            background: var(--cream-light);
            border: 1px solid var(--border-soft);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(61, 43, 32, 0.08);
            margin-bottom: 30px;
            overflow-x: auto;
        }

        .mermaid {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 600px;
        }

        .info-section {
            background: var(--cream-light);
            border: 1px solid var(--border-soft);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(61, 43, 32, 0.08);
            margin-bottom: 30px;
        }

        .info-section h2 {
            color: var(--brown-dark);
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid var(--border-soft);
            padding-bottom: 10px;
        }

        .info-section h3 {
            color: var(--brown-mid);
            margin-top: 20px;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .info-section p,
        .info-section li {
            color: #4a3a2c;
            line-height: 1.8;
            margin-bottom: 10px;
        }

        .info-section ul {
            margin-left: 20px;
        }

        .layer {
            background: var(--cream);
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid var(--terracotta);
            border-radius: 5px;
        }

        .layer strong {
            color: var(--brown-mid);
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: var(--terracotta);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
            font-size: 0.95em;
        }

        .btn:hover {
            background: var(--terracotta-dark);
        }

        .btn-back {
            background: var(--border-soft);
            color: var(--brown-dark);
        }

        .btn-back:hover {
            background: #ddccae;
        }

        footer {
            text-align: center;
            color: var(--brown-dark);
            padding: 20px;
            font-size: 0.9em;
        }

        .component-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .component-card {
            background: var(--cream);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--terracotta);
        }

        .component-card h4 {
            color: var(--brown-mid);
            margin-bottom: 10px;
        }

        .component-card p {
            color: #6b5c4a;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.5em;
            }

            .content {
                padding: 20px;
            }

            .mermaid {
                min-height: 400px;
            }
        }
    </style>
</head>

<body>

            <a href="index.html" class="btn btn-back">← กลับไปหน้าแรก | Back to Home</a>
            <a href="README.md" class="btn">📄 README</a>
            <a href="analysis-design.md" class="btn">📊 Analysis & Design</a>
        </div>

        </header>
